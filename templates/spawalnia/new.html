{% extends "base.html" %}
{% block title %}Nowy wpis – Spawalnia{% endblock %}

{% block content %}
<div class="sp-new-wrap">

  <div class="sp-new-header">
    <span class="sp-new-title">
      <i class="bi bi-fire" style="color:var(--danger-text);margin-right:.3rem;"></i>
      Nowy wpis kontroli spawalni
    </span>
    <a href="{{ url_for('spawalnia.list_records') }}" class="btn btn-sm btn-ghost">
      <i class="bi bi-list-ul"></i>
    </a>
  </div>

  <div class="sp-new-card">
    <form method="post" action="{{ url_for('spawalnia.new_record') }}" autocomplete="off">
      {{ csrf_input() }}

      <div class="sp-new-field">
        <label class="sp-new-lbl" for="zo_number">Numer ZO</label>
        <input type="text" id="zo_number" name="zo_number" class="sp-new-input"
               value="{{ prefill_zo }}"
               placeholder="np. ZO-2025-001" required autofocus>
      </div>

      <div class="sp-new-field">
        <label class="sp-new-lbl" for="quantity">Ilość list kontrolnych</label>
        <div class="sp-qty-row">
          <button type="button" class="sp-qty-btn" id="qty-minus" aria-label="Mniej">−</button>
          <input type="number" id="quantity" name="quantity" class="sp-qty-input"
                 value="1" min="1" max="99" readonly>
          <button type="button" class="sp-qty-btn" id="qty-plus" aria-label="Więcej">+</button>
        </div>
        <span class="sp-new-hint">Każda lista wypełniana osobno po kolei.</span>
      </div>

      <button type="submit" class="sp-new-submit">
        <i class="bi bi-arrow-right"></i> Dalej — wypełnij listę
      </button>
    </form>
  </div>
</div>

<style>
.sp-new-wrap { max-width: 480px; display: flex; flex-direction: column; gap: .6rem; }

.sp-new-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 1rem;
  font-weight: 600;
  min-height: 40px;
}
.sp-new-title { display: flex; align-items: center; }

.sp-new-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.sp-new-card form { display: flex; flex-direction: column; gap: 1rem; }

.sp-new-field { display: flex; flex-direction: column; gap: .3rem; }
.sp-new-lbl {
  font-size: .68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .09em;
  color: var(--text-muted);
}
.sp-new-input {
  width: 100%; min-height: 52px;
  padding: .5rem .85rem;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 1.05rem;
  background: var(--card-bg);
  color: var(--text, inherit);
  box-sizing: border-box;
}
.sp-new-input:focus {
  outline: 2px solid var(--progress-blue);
  outline-offset: 1px;
  border-color: var(--progress-blue);
}
.sp-new-hint { font-size: .78rem; color: var(--text-muted); }

/* Ilość — +/- przyciski */
.sp-qty-row { display: flex; align-items: center; gap: .5rem; }
.sp-qty-btn {
  width: 52px; height: 52px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--card-bg);
  color: var(--text, inherit);
  font-size: 1.4rem; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s, border-color .1s;
  flex-shrink: 0;
}
.sp-qty-btn:hover   { background: var(--border); }
.sp-qty-btn:active  { opacity: .75; }
.sp-qty-input {
  width: 80px; height: 52px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 1.3rem; font-weight: 700;
  text-align: center;
  background: var(--card-bg);
  color: var(--text, inherit);
  -moz-appearance: textfield;
}
.sp-qty-input::-webkit-outer-spin-button,
.sp-qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.sp-new-submit {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  width: 100%; min-height: 58px;
  border: none; border-radius: 12px;
  background: var(--btn-primary); color: var(--btn-text);
  font-size: 1.05rem; font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
  margin-top: .25rem;
}
.sp-new-submit:hover  { opacity: .9; }
.sp-new-submit:active { opacity: .75; }

@media (max-width: 520px) {
  .sp-new-wrap { max-width: 100%; }
}
</style>

<script>
(function () {
  var inp  = document.getElementById('quantity');
  var plus = document.getElementById('qty-plus');
  var min  = document.getElementById('qty-minus');
  plus.addEventListener('click', function () {
    var v = parseInt(inp.value, 10) || 1;
    if (v < 99) inp.value = v + 1;
  });
  min.addEventListener('click', function () {
    var v = parseInt(inp.value, 10) || 1;
    if (v > 1) inp.value = v - 1;
  });
})();
</script>
{% endblock %}

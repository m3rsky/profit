{% extends "base.html" %}
{% block title %}Nowe zadanie QA{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:20px;">
  <a href="{{ url_for('zadania_qa.list_tasks') }}" class="btn btn-outline btn-sm" style="margin-bottom:8px;">
    <i class="bi bi-arrow-left"></i> Powrót
  </a>
  <h1 class="page-title" style="font-size:1.3rem;margin:0;">
    <i class="bi bi-plus-circle" style="color:var(--accent,#1a6e8a);margin-right:6px;"></i>
    Nowe zadanie QA
  </h1>
</div>

<div class="card" style="max-width:640px;">
  <div class="card-body">
    <form method="post">
      {{ csrf_input() }}
      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label">Nazwa zadania <span style="color:#c0392b;">*</span></label>
        <input type="text" name="title" class="form-control"
               value="{{ form.get('title', '') }}"
               placeholder="np. Kontrola przekątnej PSH/PS"
               required maxlength="256" style="font-size:16px;">
      </div>
      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label">Opis</label>
        <textarea name="description" class="form-control" rows="4"
                  placeholder="Szczegółowy opis czynności do wykonania…"
                  style="font-size:16px;">{{ form.get('description', '') }}</textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;flex-wrap:wrap;">
        <a href="{{ url_for('zadania_qa.list_tasks') }}" class="btn btn-outline" style="flex:1;text-align:center;min-width:100px;">Anuluj</a>
        <button type="submit" class="btn btn-primary" style="flex:2;min-width:140px;">
          <i class="bi bi-check-lg"></i> Dodaj zadanie
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}

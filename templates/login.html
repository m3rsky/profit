<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Logowanie – RP-Sys</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/erp-design.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body class="login-page">
  <div class="login-wrapper">

    <div class="login-panel">

      <div class="login-brand">
        <div class="login-logo-mark">RP</div>
        <div class="login-brand-text">
          <div class="login-brand-name">System RP</div>
          <div class="login-brand-sub">RP-Sys — Raportowanie Produkcji</div>
        </div>
      </div>

      <div class="login-box">
        <div class="login-box-accent"></div>

        <h2 class="login-heading">Zaloguj się</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="post" class="login-form">
          {{ csrf_input() }}
          <div class="form-group">
            <label class="form-label" for="username">
              <i class="bi bi-person"></i> Użytkownik
            </label>
            <input class="form-control" type="text" id="username" name="username"
                   autocomplete="username" autofocus required placeholder="Nazwa użytkownika">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">
              <i class="bi bi-lock"></i> Hasło
            </label>
            <input class="form-control" type="password" id="password" name="password"
                   autocomplete="current-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg login-submit">
            <i class="bi bi-box-arrow-in-right"></i> Zaloguj się
          </button>
        </form>
      </div>

      <div class="login-footer">
        <img src="{{ url_for('static', filename='k_logo.jpg') }}" alt="Kubiak" class="login-footer-logo">
        <span class="login-footer-name">Firma Kubiak</span>
      </div>

    </div>
  </div>
</body>
</html>
